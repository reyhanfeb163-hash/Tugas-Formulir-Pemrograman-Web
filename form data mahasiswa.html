<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Data Mahasiswa</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            box-sizing: border-box;
        }
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .btn-toggle-input {
            position: absolute;
            right: 10px;
            top: 6px;
            background: transparent;
            border: none;
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: #666;
        }
        .btn-toggle-input:hover { color: #333; }
        
        button {
            padding: 10px;
            margin-right: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .submit { background: green; color: white; }
        .reset { background: orange; color: white; }

        /* Style untuk tombol di dalam tabel */
        .btn-edit { background: #ffc107; color: black; padding: 5px 10px; font-size: 12px; }
        .btn-delete { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-show-pass { 
            background: transparent; 
            border: none; 
            padding: 2px; 
            cursor: pointer; 
            margin-left: 5px;
            vertical-align: middle;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        
        .pass-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<form id="formMahasiswa">
    <label>NIM</label>
    <input type="text" id="nim" placeholder="Masukkan NIM" required>

    <label>Nama</label>
    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" required>

    <label>Alamat</label>
    <textarea id="alamat" placeholder="Masukkan alamat lengkap"></textarea>

    <label>Jenis Kelamin</label><br>
    <input type="radio" name="jk" value="Pria"> Pria
    <input type="radio" name="jk" value="Wanita"> Wanita
    <input type="radio" name="jk" value="Lainnya"> Lainnya
    <br><br>

    <label>Tanggal Lahir (dd/mm/yyyy)</label>
    <div style="display: flex; gap: 10px;">
        <select id="tanggal"></select>
        <select id="bulan">
            <option value="01">Januari</option>
            <option value="02">Februari</option>
            <option value="03">Maret</option>
            <option value="04">April</option>
            <option value="05">Mei</option>
            <option value="06">Juni</option>
            <option value="07">Juli</option>
            <option value="08">Agustus</option>
            <option value="09">September</option>
            <option value="10">Oktober</option>
            <option value="11">November</option>
            <option value="12">Desember</option>
        </select>
        <select id="tahun"></select>
    </div>

    <label>Password</label>
    <div class="password-container">
        <input type="password" id="password" placeholder="Password">
        <button type="button" class="btn-toggle-input" onclick="toggleInputPassword()">
            <svg id="eye-icon-form" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <button type="submit" class="submit">Submit</button>
    <button type="reset" class="reset">Reset</button>
</form>

<h2>Data Mahasiswa</h2>

<table>
    <thead>
        <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Alamat</th>
            <th>JK</th>
            <th>TTL</th>
            <th>Password</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    const form = document.getElementById("formMahasiswa");
    const tableBody = document.getElementById("tableBody");
    const selectTanggal = document.getElementById("tanggal");
    const selectBulan = document.getElementById("bulan");
    const selectTahun = document.getElementById("tahun");
    const inputPass = document.getElementById("password");

    // Ikon Mata (SVG)
    const eyeSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeOffSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;

    // Toggle password di form input
    function toggleInputPassword() {
        const btn = document.querySelector(".btn-toggle-input");
        if (inputPass.type === "password") {
            inputPass.type = "text";
            btn.innerHTML = eyeOffSVG;
        } else {
            inputPass.type = "password";
            btn.innerHTML = eyeSVG;
        }
    }

    // Toggle password di dalam tabel
    function toggleTablePassword(btn, rawPassword) {
        const span = btn.previousElementSibling;
        if (span.innerText === "********") {
            span.innerText = rawPassword;
            btn.innerHTML = eyeOffSVG;
        } else {
            span.innerText = "********";
            btn.innerHTML = eyeSVG;
        }
    }

    function updateDays() {
        const month = parseInt(selectBulan.value);
        const year = parseInt(selectTahun.value);
        const currentSelectedDay = selectTanggal.value;
        const daysInMonth = new Date(year, month, 0).getDate();

        selectTanggal.innerHTML = "";
        for (let i = 1; i <= daysInMonth; i++) {
            let val = i < 10 ? '0' + i : i;
            let option = document.createElement("option");
            option.value = val;
            option.text = val;
            selectTanggal.appendChild(option);
        }

        if (parseInt(currentSelectedDay) <= daysInMonth) {
            selectTanggal.value = currentSelectedDay;
        }
    }

    for (let i = 1990; i <= 2025; i++) {
        selectTahun.innerHTML += `<option value="${i}">${i}</option>`;
    }

    updateDays();
    selectBulan.addEventListener("change", updateDays);
    selectTahun.addEventListener("change", updateDays);

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const nim = document.getElementById("nim").value;
        const nama = document.getElementById("nama").value;
        const alamat = document.getElementById("alamat").value;
        const jk = document.querySelector('input[name="jk"]:checked')?.value || "-";
        const tanggal = selectTanggal.value;
        const bulan = selectBulan.value;
        const tahun = selectTahun.value;
        const ttl = `${tanggal}/${bulan}/${tahun}`;
        const password = inputPass.value;

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${nim}</td>
            <td>${nama}</td>
            <td>${alamat}</td>
            <td>${jk}</td>
            <td>${ttl}</td>
            <td>
                <div class="pass-cell">
                    <span>********</span>
                    <button type="button" class="btn-show-pass" onclick="toggleTablePassword(this, '${password}')">${eyeSVG}</button>
                </div>
            </td>
            <td>
                <button class="btn-edit" onclick="editRow(this, '${password}')">Edit</button>
                <button class="btn-delete" onclick="deleteRow(this)">Hapus</button>
            </td>
        `;

        tableBody.appendChild(row);
        form.reset();
        inputPass.type = "password";
        document.querySelector(".btn-toggle-input").innerHTML = eyeSVG;
        updateDays();
    });

    function deleteRow(el) {
        if(confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            el.closest("tr").remove();
        }
    }

    function editRow(el, rawPassword) {
        const row = el.closest("tr");
        const cells = row.children;

        document.getElementById("nim").value = cells[0].innerText;
        document.getElementById("nama").value = cells[1].innerText;
        document.getElementById("alamat").value = cells[2].innerText;
        
        const jkValue = cells[3].innerText;
        const radios = document.getElementsByName("jk");
        for(let r of radios) {
            if(r.value === jkValue) r.checked = true;
        }

        const ttlParts = cells[4].innerText.split('/');
        if(ttlParts.length === 3) {
            selectTahun.value = ttlParts[2];
            selectBulan.value = ttlParts[1];
            updateDays();
            selectTanggal.value = ttlParts[0];
        }

        document.getElementById("password").value = rawPassword;
        row.remove();
    }
</script>

</body>
</html>
